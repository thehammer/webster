<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Webster</h1>
  </div>

  <div id="servers-list"></div>

  <div class="field add-server">
    <label for="add-port">Add Server Port</label>
    <div class="add-row">
      <input id="add-port" type="number" placeholder="3456" min="1" max="65535">
      <button id="add-btn">Add</button>
    </div>
  </div>

  <div id="error" class="error" hidden></div>

  <script src="popup.js"></script>
</body>
</html>
